<!DOCTYPE html>
<html>
<head>
  <title>THE DATA SITE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin: 0; font-family: Arial; background: #0f172a; color: white; }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">
  <h2>THE DATA SITE</h2>
  <p>Loading...</p>
</div>

<iframe id="appFrame"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");
  const token = params.get("token");

  let base = "https://script.google.com/macros/s/AKfycbwV5CaBsEIRzNmcJ89-Zcs0wT3cGC_zXGIXUXzzMaHEwAQdR7oM4MxZYmsoohJ-VQGZ/exec";
  let url = base;

  if (page === "dashboard") {
  url += "?page=dashboard";

  if (token) {
    url += "&token=" + token;
  }
} else {
  // 🔥 FORCE LOGIN PAGE FROM APPS SCRIPT
  url += "?page=login";
}

  const iframe = document.getElementById("appFrame");
  const loader = document.getElementById("loader");

  iframe.src = url;

  iframe.onload = () => {
    loader.style.display = "none";
    iframe.style.display = "block";
  };
</script>

</body>
</html>
