<!DOCTYPE html>
<html>
<head>
  <title>THE DATA SITE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* Loading screen */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .spinner {
      border: 4px solid #1e293b;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">
  <div class="logo">THE DATA SITE</div>
  <div class="spinner"></div>
  <p>Loading your learning experience...</p>
</div>

<iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwV5CaBsEIRzNmcJ89-Zcs0wT3cGC_zXGIXUXzzMaHEwAQdR7oM4MxZYmsoohJ-VQGZ/exec"></iframe>

<script>
  const iframe = document.getElementById("appFrame");
  const loader = document.getElementById("loader");

  iframe.onload = () => {
    loader.style.display = "none";
    iframe.style.display = "block";
  };
</script>

</body>
</html>
